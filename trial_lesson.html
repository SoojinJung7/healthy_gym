<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2563EB" />
  <link rel="manifest" href="manifest.json" />
  <title>체험레슨 신청 · 헬피짐</title>
  <link rel="stylesheet" href="css/style.css?v=14" />
</head>
<body>
  <main class="shell shell--form">
    <div class="page-head">
      <a class="back-btn" href="index.html">←</a>
      <div>
        <h2>🎟️ 체험레슨 신청하기</h2>
        <p>무료 체험 후 결정하세요</p>
      </div>
    </div>

    <form class="card" data-form="trial">
      <div class="field field--wide">
        <label>관심 프로그램 <span class="hint">(복수 선택 가능)</span></label>
        <div class="chips" data-name="program" data-required="관심 프로그램을 선택해 주세요.">
          <div class="chip">개인 PT</div>
          <div class="chip">그룹 GX</div>
          <div class="chip">필라테스</div>
          <div class="chip">스피닝</div>
          <div class="chip">기구 사용법</div>
          <div class="chip">기타</div>
        </div>
      </div>

      <div class="field">
        <label>성함</label>
        <input type="text" name="name" placeholder="성함을 입력해 주세요"
               data-required="성함을 입력해 주세요." autocomplete="off" />
      </div>

      <div class="field">
        <label>연락처</label>
        <input type="tel" name="phone" placeholder="010-0000-0000"
               data-required="연락처를 입력해 주세요." autocomplete="off" />
      </div>

      <div class="field">
        <label>희망 날짜 <span class="hint">(선택)</span></label>
        <input type="date" name="date" />
      </div>

      <div class="field">
        <label>희망 시간대 <span class="hint">(선택)</span></label>
        <div class="chips" data-name="time">
          <div class="chip">오전</div>
          <div class="chip">점심</div>
          <div class="chip">오후</div>
          <div class="chip">저녁</div>
        </div>
      </div>

      <button type="submit" class="submit-btn">체험레슨 신청하기</button>
    </form>
  </main>

  <script src="js/config.js?v=14"></script>
  <script src="js/app.js?v=14"></script>
</body>
</html>
