<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2563EB" />
  <link rel="manifest" href="manifest.json" />
  <title>접수 완료 · 헬피짐</title>
  <link rel="stylesheet" href="css/style.css?v=14" />
</head>
<body>
  <main class="shell">
    <div class="done">
      <div class="check">✓</div>
      <h2>접수되었습니다!</h2>
      <p>소중한 의견 감사합니다.<br />데스크에서 확인 후 빠르게 도와드리겠습니다.</p>
      <a href="index.html">처음으로</a>
      <div class="countdown"><span id="sec">5</span>초 후 자동으로 처음 화면으로 돌아갑니다</div>
    </div>
  </main>

  <script>
    // 키오스크: 잠시 후 메인으로 자동 복귀
    var n = 5;
    var el = document.getElementById("sec");
    var t = setInterval(function () {
      n -= 1;
      if (el) el.textContent = n;
      if (n <= 0) { clearInterval(t); location.href = "index.html"; }
    }, 1000);
  </script>
</body>
</html>
