<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#2563EB" />
  <link rel="manifest" href="manifest.json" />
  <title>빠른 문의하기 · 헬피짐</title>
  <link rel="stylesheet" href="css/style.css?v=18" />
</head>
<body>
  <main class="shell shell--form">
    <div class="page-head">
      <a class="back-btn" href="index.html">←</a>
      <div>
        <h2>💬 빠른 문의하기</h2>
        <p>남겨주시면 데스크에서 빠르게 연락드려요</p>
      </div>
    </div>

    <form class="card" data-form="quick">
      <div class="field field--wide">
        <label>문의 종류 <span class="hint">(복수 선택 가능)</span></label>
        <div class="chips" data-name="topic">
          <div class="chip">🏋️ 퍼스널 트레이닝(PT)</div>
          <div class="chip">🧘 필라테스</div>
          <div class="chip">🎟️ 체험 레슨 신청</div>
        </div>
      </div>

      <div class="field">
        <label>성함</label>
        <input type="text" name="name" placeholder="성함을 입력해 주세요"
               data-required="성함을 입력해 주세요." autocomplete="off" />
      </div>

      <div class="field">
        <label>연락처</label>
        <input type="tel" name="phone" placeholder="010-0000-0000"
               data-required="연락처를 입력해 주세요." autocomplete="off" />
      </div>

      <div class="field field--wide">
        <label>무엇을 도와드릴까요? <span class="hint">(복수 선택 가능)</span></label>
        <div class="chips" data-name="needs">
          <div class="chip">⏰ 레슨 시간이 궁금해요</div>
          <div class="chip">💰 가격 알고 싶어요</div>
          <div class="chip">💬 자세한 상담 원해요</div>
          <div class="chip">📊 인바디부터 상담받고 싶어요</div>
          <div class="chip">🩹 통증을 해결하고 싶어요</div>
          <div class="chip">🔥 다이어트 하고 싶어요</div>
        </div>
      </div>

      <p class="form-note field--wide">🛠️ 시설 관련 문의는 <b>‘시설 건의하기’</b> 메뉴를 참고해 주세요.</p>

      <button type="submit" class="submit-btn">문의 남기기</button>
    </form>
  </main>

  <script src="js/config.js?v=18"></script>
  <script src="js/app.js?v=18"></script>
</body>
</html>
